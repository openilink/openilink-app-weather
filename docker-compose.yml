services:
  weather-app:
    build: .
    container_name: openilink-app-weather
    restart: unless-stopped
    environment:
      PORT: "${PORT:-8091}"
      HUB_URL: "${HUB_URL}"
      BASE_URL: "${BASE_URL}"
      DB_PATH: "/data/weather.db"
    volumes:
      - weather-data:/data

volumes:
  weather-data:
